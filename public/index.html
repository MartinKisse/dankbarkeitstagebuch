<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dankbarkeitstagebuch</title>
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f5f3ef" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <div class="auth-bar">
        <button type="button" onclick="loginWithGoogle()">
          Mit Google anmelden
        </button>
        <p class="legal-hint">
          Mit dem Login akzeptierst du unsere
          <a href="/legal.html">Datenschutzbestimmungen</a>.
        </p>
      </div>
      <section class="intro">
        <div class="app-header">
          <img src="/icon-192.png" alt="Logo" class="app-logo" />
          <h1>Dankbarkeitstagebuch</h1>
        </div>
      </section>

      <nav class="app-tabs" aria-label="Hauptbereiche">
        <button class="tab-button is-active" type="button" data-view="entries" aria-controls="entries-view" aria-selected="true">
          Einträge
        </button>
        <button class="tab-button" type="button" data-view="calendar" aria-controls="calendar-view" aria-selected="false">
          Kalender
        </button>
        <button class="tab-button" type="button" data-view="trash" aria-controls="trash-view" aria-selected="false">
          Papierkorb
        </button>
      </nav>

      <div id="entries-view" class="app-view">
      <section class="upload-panel" aria-labelledby="personal-greeting">
        <h2 id="personal-greeting"></h2>
        <div class="entry-date-control">
          <label for="entry-date">Kalendertag</label>
          <div class="entry-date-row">
            <input id="entry-date" type="date" />
            <div class="entry-date-shortcuts">
              <button id="entry-date-today" class="secondary-button" type="button">Heute</button>
              <button id="entry-date-yesterday" class="secondary-button" type="button">Gestern</button>
            </div>
          </div>
        </div>
        <div class="recording-controls">
          <button id="record-button" type="button">Aufnahme starten</button>
        </div>
        <div id="recording-visualizer" class="recording-visualizer" hidden>
          <span>Mikrofon aktiv</span>
          <canvas id="visualizer-canvas" width="360" height="72" aria-hidden="true"></canvas>
        </div>
        <div id="recording-preview" class="recording-preview" hidden>
          <audio id="recording-audio" controls></audio>
          <div class="preview-actions">
            <button id="discard-recording-button" class="secondary-button" type="button">Verwerfen</button>
            <button id="transcribe-recording-button" type="button">Transkribieren</button>
          </div>
        </div>
        <div id="draft-editor" class="draft-editor" hidden>
          <h3>Entwurf prüfen</h3>
          <label for="draft-bullets">Stichpunkte</label>
          <textarea id="draft-bullets" rows="6"></textarea>
          <details id="draft-original-details" class="draft-original">
            <summary>Originaltext anzeigen</summary>
            <p id="draft-original-text"></p>
          </details>
          <div class="draft-actions">
            <button id="discard-draft-button" class="secondary-button" type="button">Entwurf verwerfen</button>
            <button id="save-draft-button" type="button">Speichern</button>
          </div>
        </div>
      </section>

      <section class="entries-section" aria-labelledby="entries-title">
        <div class="section-header">
          <h2 id="entries-title">Bisherige Einträge</h2>
          <button id="refresh-button" class="secondary-button" type="button">Neu laden</button>
        </div>
        <div id="entries" class="entries"></div>
      </section>
      </div>

      <section id="calendar-view" class="app-view" aria-labelledby="calendar-title" hidden>
        <div class="calendar-panel">
          <div class="calendar-header">
            <button id="calendar-prev" class="secondary-button" type="button">← Monat zurück</button>
            <h2 id="calendar-title">Kalender</h2>
            <button id="calendar-next" class="secondary-button" type="button">Monat vor →</button>
          </div>
          <div class="calendar-shortcuts">
            <button id="calendar-today" class="secondary-button" type="button">Zu heute</button>
          </div>
          <div id="calendar-month-label" class="calendar-month-label"></div>
          <div class="calendar-weekdays" aria-hidden="true">
            <span>Mo</span>
            <span>Di</span>
            <span>Mi</span>
            <span>Do</span>
            <span>Fr</span>
            <span>Sa</span>
            <span>So</span>
          </div>
          <div id="calendar-grid" class="calendar-grid"></div>
          <div id="calendar-day-entries" class="calendar-day-entries" aria-live="polite"></div>
        </div>
      </section>

      <section id="trash-view" class="app-view" aria-labelledby="trash-title" hidden>
        <div class="trash-panel">
          <div class="section-header">
            <h2 id="trash-title">Papierkorb</h2>
            <button id="trash-back-button" class="secondary-button" type="button">Zurück zu den Einträgen</button>
          </div>
          <div id="trash-entries" class="trash-entries"></div>
        </div>
      </section>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <footer class="footer">
      <a href="/legal.html">Impressum & Datenschutz</a>
    </footer>

    <script type="module" src="/app.js"></script>
  </body>
</html>
